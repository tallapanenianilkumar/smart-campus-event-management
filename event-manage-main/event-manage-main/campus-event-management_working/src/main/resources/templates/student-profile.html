<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px auto;
            display: block;
            border: 3px solid #003366;
        }
    </style>
</head>
<body class="student-page">
<div class="container" style="max-width: 600px;">
    <div class="nav" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <div>
            <h2 style="margin-bottom: 5px;">My Profile</h2>
        </div>
        <div>
            <a href="/student/dashboard" class="btn">Back to Dashboard</a>
        </div>
    </div>

    <div style="text-align: center;">
        <img id="profilePreview" th:src="${student.imageDp != null and !student.imageDp.empty} ? student.imageDp : 'https://via.placeholder.com/150'" class="profile-img" alt="Profile Picture">
    </div>

    <form th:action="@{/student/profile/edit}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>Upload Profile Image:</label>
            <input type="file" name="profileImage" accept="image/*" onchange="previewImage(this)">
            <small style="display: block; margin-top: 5px; color: #555;">Choose an image file from your device. If both upload and URL are provided, upload will be used.</small>
        </div>
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" name="name" th:value="${student.name}" required>
        </div>
        <div class="form-group">
            <label>Email Address:</label>
            <input type="email" name="email" th:value="${student.email}" required>
        </div>
        <div class="form-group">
            <label>Phone Number:</label>
            <input type="text" name="number" th:value="${student.number}">
        </div>
        <div class="form-group">
            <label>Department:</label>
            <input type="text" name="department" th:value="${student.department}">
        </div>
        <div class="form-group">
            <label>Profile Image URL:</label>
            <input type="url" name="imageDp" th:value="${student.imageDp}">
        </div>
        <div class="form-group">
            <label>Basic Details (Bio):</label>
            <textarea name="basicDetails" rows="4" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" th:text="${student.basicDetails}"></textarea>
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%; margin-bottom: 15px;">Update Profile</button>
    </form>
    
    <script>
        function previewImage(input) {
            const preview = document.getElementById('profilePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
    <hr style="margin: 20px 0;">
    <div style="text-align: center;">
        <a href="/student/profile/delete" class="btn btn-danger" onclick="return confirm('WARNING: Are you sure you want to permanently delete your account and withdraw from all events?');" style="width: 100%; box-sizing: border-box;">Delete My Account</a>
    </div>
</div>
</body>
</html>
