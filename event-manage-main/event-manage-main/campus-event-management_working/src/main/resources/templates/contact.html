<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .contact-box { background: var(--nav-bg); padding: 30px; border-radius: 8px; border: 2px solid var(--accent-color); margin: 40px auto; max-width: 400px; }
        .contact-box h3 { margin-bottom: 5px; color: var(--text-color); }
        .contact-box p { color: var(--accent-color); font-weight: bold; margin-bottom: 25px; }
    </style>
</head>
<body>
<div class="container" style="text-align: center; max-width: 700px; padding: 50px;">
    <h1 style="font-size: 3em; margin-bottom: 10px;">📞 Contact Us</h1>
    <p style="font-size: 1.2em;">Feel free to reach out to the Campus Dean of Student Affairs for any event-related queries or massive technical support issues.</p>
    
    <div class="contact-box">
        <h3>📍 Main Campus Office</h3>
        <p>Building 4, Room 202</p>
        
        <h3>📧 Email Address</h3>
        <p>events@moderntech.edu.in</p>
        
        <h3>📞 Phone Number</h3>
        <p>+91 98765 43210</p>
    </div>
    
    <button class="btn btn-success" onclick="history.back()" style="padding: 15px 40px; font-size: 18px;">⬅️ Go Back</button>
</div>
<button class="theme-toggle" onclick="document.body.classList.toggle('dark-mode');">🌓 Toggle Theme</button>
</body>
</html>
