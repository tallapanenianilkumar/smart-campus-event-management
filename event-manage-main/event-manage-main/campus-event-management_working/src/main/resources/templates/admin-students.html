<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Students</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-page">
<div class="container">
    <div class="nav" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <div>
            <h2>Manage Students</h2>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
            <a href="/admin/dashboard" class="btn">Events</a>
            <a href="/admin/students" class="btn btn-primary">Students</a>
            <a href="/admin/participations" class="btn">Participations</a>
            <a href="/admin/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.department}"></td>
                <td>
                    <a th:href="@{'/admin/edit-student/' + ${student.id}}" class="btn">Edit</a>
                    <a th:href="@{'/admin/delete-student/' + ${student.id}}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this student and all their event joins?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
