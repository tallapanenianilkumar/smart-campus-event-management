<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Event</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-page">
<div class="container" style="max-width: 600px;">
    <div class="nav">
        <h2>Add New Event</h2>
        <a href="/admin/dashboard">Back to Dashboard</a>
    </div>

    <form action="/admin/add-event" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>Title:</label>
            <input type="text" name="title" required>
        </div>
        <div class="form-group">
            <label>Description:</label>
            <textarea name="description" rows="4" required></textarea>
        </div>
        <div class="form-group">
            <label>Image URL:</label>
            <input type="text" name="imageUrl" placeholder="Enter image URL if not uploading">
        </div>
        <div class="form-group">
            <label>Upload Image:</label>
            <input type="file" name="imageFile" accept="image/*">
            <small>Use either URL or upload file. Uploaded file will override the URL.</small>
        </div>
        <div class="form-group">
            <label>Date:</label>
            <input type="date" name="date" required>
        </div>
        <div class="form-group">
            <label>Time:</label>
            <input type="time" name="time" required>
        </div>
        <div class="form-group">
            <label>Day:</label>
            <select name="day" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Save Event</button>
    </form>
</div>
</body>
</html>
